site_name: readme.dm
site_description: General notes and musings of Dylan Madisetti
site_author: Dylan Madisetti
site_url: https://dmadisetti.github.io/blog/

# Repository
repo_name: dmadisetti/blog
repo_url: https://github.com/dmadisetti/blog

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  # Experiment: body prose is proportional (Fira Sans); text goes mono (Fira
  # Code) only on the vim cursor-active block (see extra.css). Code is always
  # mono; marimo islands are always mono (hardcoded in marimo-islands.css).
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant        # Instant loading
    - navigation.tracking       # URL updates
    - navigation.tabs          # Top-level tabs
    - navigation.top           # Back to top button
    - search.suggest           # Search suggestions
    - search.highlight         # Highlight search results
    - content.code.copy        # Code copy button
    - content.code.annotate    # Code annotations
    - content.tooltips         # Styled hover tooltips ([text][caption] hook)

# Plugins
plugins:
  - search
  - blog:
      # Blog is the site root: docs/index.md is the blog index (prelude +
      # post list), posts live in docs/posts.
      blog_dir: .
      blog_toc: true
      post_dir: posts
      post_date_format: medium
      post_url_format: "{slug}"
      authors: false
      pagination_per_page: 10
      archive: true
      archive_name: archive
      archive_date_format: yyyy
      # Categories consolidated into tags — single taxonomy.
      categories: false
  - tags:
      tags_file: tags.md
  # RSS/Atom feed — the POSSE substrate. Canonical post lives on GH Pages; the
  # feed is what aggregators (Lobsters, newsletters, readers) and the GH-release
  # drip hang off. Posts only (match_path), dated from frontmatter.
  - rss:
      match_path: "posts/.*"
      date_from_meta:
        as_creation: date
      categories:
        - tags
      comments_path: "#__comments"

# marimo cells are rendered as reactive islands by a local hook
# (hooks/marimo_islands.py) backed by `marimo export islands-json`, replacing
# the mkdocs-marimo plugin.
hooks:
  - hooks/marimo_islands.py
  # Ships docs/.well-known/ (atproto-did for the Bluesky handle, etc.) into the
  # built site — mkdocs skips dot-dirs otherwise.
  - hooks/well_known.py
  # Grouped inline tooltips: [visible phrase][caption] -> hover tooltip.
  - hooks/tooltips.py

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: marimo
          class: marimo
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

# Extra JavaScript
extra_javascript:
  # NOTE: polyfill.io was removed — the domain was sold and now serves
  # malware/redirects (2024 supply-chain compromise). Modern browsers don't
  # need the es6 polyfill for MathJax anyway.
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/vim-navigation.js
  - javascripts/marimo-theme.js
  - javascripts/dm-underline.js

# Extra CSS
extra_css:
  - stylesheets/extra.css
  - stylesheets/marimo-islands.css
  - stylesheets/site.css
  - stylesheets/paper-dark.css

# Extra
extra:
  # Comments via giscus (GitHub Discussions). Fill repo_id / category_id from
  # https://giscus.app after creating the repo, enabling Discussions, and
  # installing the giscus app. Until repo_id is set, comments stay hidden
  # (the Substack subscribe CTA still renders on posts).
  giscus:
    repo: dmadisetti/blog
    repo_id: "R_kgDOS63aqQ"
    category: Announcements
    category_id: "DIC_kwDOS63aqc4C_Kyy"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dmadisetti
  generator: false

# Navigation
nav:
  # Blog as a section so the plugin nests Archive under it in the sidebar
  # (rather than as a top-level tab). index.md is the blog landing.
  - blog:
      - index.md
  - tags: tags.md
  - about: about.md
